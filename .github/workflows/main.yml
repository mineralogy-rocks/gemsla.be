name: Live CI


on:
  push:
    branches: [ development ]


jobs:

  build-container:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: docker/login-action@v2
      with:
        registry: registry.gitlab.com
        username: ${{ secrets.GITLAB_USERNAME }}
        password: ${{ secrets.GITLAB_PASSWORD }}

    - uses: docker/setup-buildx-action@v2
      with:
        install: true
        version: v0.9.1

    - name: Build Container
      uses: docker/build-push-action@v4
      with:
        push: true
        context: .
        file: ./.deploy/live.Dockerfile
        tags: |
          registry.gitlab.com/mineralogy-rocks/gemsla.be/frontend:${{ github.sha }}
          registry.gitlab.com/mineralogy-rocks/gemsla.be/frontend:latest


  deploy-application:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    needs: [build-container]

    steps:
    - uses: actions/checkout@v3

    - name: Prepare SSH Key
      run: |
        echo ${{ secrets.SSH_KEY }} | base64 -d > github_actions.key
        chmod 400 github_actions.key

    - name: Deploy Application
      run: |
        ssh -o StrictHostKeyChecking=no -i github_actions.key ubuntu@46.224.126.235 < ./.deploy/deploy-live.sh