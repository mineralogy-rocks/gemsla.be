name: Live CI


on:
  push:
    branches: [ main ]


jobs:

  build-container:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    continue-on-error: false


    steps:
      - uses: actions/checkout@v3

      - uses: docker/login-action@v2
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_PASSWORD }}

      - uses: docker/setup-buildx-action@v2
        with:
          install: true
          version: v0.9.1

      - name: Build Container
        uses: docker/build-push-action@v4
        with:
          push: true
          context: .
          file: ./.deploy/live.Dockerfile
          tags: |
            registry.gitlab.com/mineralogy.rocks/gemsla.be/frontend:${{ github.sha }}
            registry.gitlab.com/mineralogy.rocks/gemsla.be/frontend:latest
          build-args: |
              RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
              NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
              NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}

  deploy-application:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    needs: [build-container]
    environment: ${{ github.ref_name }}
    continue-on-error: false

    steps:
      - uses: actions/checkout@v3

      - name: Prepare SSH Key
        run: |
          echo ${{ secrets.SSH_KEY }} | base64 -d > github_actions.key
          chmod 400 github_actions.key

      - name: Deploy Application
        run: |
          ssh -o StrictHostKeyChecking=no -i github_actions.key ${{ vars.HOST_USERNAME }}@${{ vars.HOST }} < ./.deploy/deploy-live.sh