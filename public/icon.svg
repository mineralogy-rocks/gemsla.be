<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
	<!-- Clean background -->
	<rect width="512" height="512" fill="#f5f0e8" rx="64"/>

	<!-- Stylized brilliant-cut gem viewed from above -->
	<!-- Outer girdle - octagonal shape -->
	<path d="M256 48 L400 128 L448 256 L400 384 L256 464 L112 384 L64 256 L112 128 Z"
	      fill="none"
	      stroke="#000000"
	      stroke-width="16"
	      stroke-linejoin="round"/>

	<!-- Table facet - inner octagon -->
	<path d="M256 128 L328 160 L360 232 L328 304 L256 336 L184 304 L152 232 L184 160 Z"
	      fill="none"
	      stroke="#000000"
	      stroke-width="12"
	      stroke-linejoin="round"/>

	<!-- Crown facets - connecting lines -->
	<!-- Cardinal directions -->
	<line x1="256" y1="48" x2="256" y2="128" stroke="#000000" stroke-width="10"/>
	<line x1="448" y1="256" x2="360" y2="232" stroke="#000000" stroke-width="10"/>
	<line x1="256" y1="464" x2="256" y2="336" stroke="#000000" stroke-width="10"/>
	<line x1="64" y1="256" x2="152" y2="232" stroke="#000000" stroke-width="10"/>

	<!-- Diagonal directions -->
	<line x1="400" y1="128" x2="328" y2="160" stroke="#5c5c5c" stroke-width="8"/>
	<line x1="400" y1="384" x2="328" y2="304" stroke="#5c5c5c" stroke-width="8"/>
	<line x1="112" y1="384" x2="184" y2="304" stroke="#5c5c5c" stroke-width="8"/>
	<line x1="112" y1="128" x2="184" y2="160" stroke="#5c5c5c" stroke-width="8"/>

	<!-- Central point for brilliance suggestion -->
	<circle cx="256" cy="232" r="8" fill="#000000"/>
</svg>
