<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
	<defs>
		<!-- Subtle gradient for depth -->
		<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color:#ffffff"/>
			<stop offset="100%" style="stop-color:#f5f0e8"/>
		</linearGradient>

		<!-- Noise texture pattern -->
		<filter id="noise" x="0%" y="0%" width="100%" height="100%">
			<feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
			<feColorMatrix type="saturate" values="0" result="mono"/>
			<feBlend in="SourceGraphic" in2="mono" mode="multiply"/>
		</filter>

		<!-- Subtle shadow for text -->
		<filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
			<feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
			<feOffset dx="0" dy="1" result="shadow"/>
			<feComposite in="SourceGraphic" in2="shadow" operator="over"/>
		</filter>
	</defs>

	<!-- Background -->
	<rect width="1200" height="630" fill="url(#bgGradient)"/>

	<!-- Subtle noise overlay -->
	<rect width="1200" height="630" fill="#f5f0e8" opacity="0.05" filter="url(#noise)"/>

	<!-- Decorative vertical line (matching site design) -->
	<line x1="900" y1="80" x2="900" y2="550" stroke="#d4cec4" stroke-width="1" opacity="0.7"/>

	<!-- Horizontal accent line -->
	<line x1="100" y1="315" x2="320" y2="315" stroke="#d4cec4" stroke-width="1" opacity="0.7"/>

	<!-- Large wireframe gem decoration on the left side -->
	<g transform="translate(160, 315) scale(2.2)" opacity="0.15">
		<!-- Outer octagon -->
		<path d="M0 -100 L70 -70 L100 0 L70 70 L0 100 L-70 70 L-100 0 L-70 -70 Z"
		      fill="none"
		      stroke="#000000"
		      stroke-width="3"
		      stroke-linejoin="round"/>
		<!-- Inner octagon (table) -->
		<path d="M0 -50 L35 -35 L50 0 L35 35 L0 50 L-35 35 L-50 0 L-35 -35 Z"
		      fill="none"
		      stroke="#000000"
		      stroke-width="2"
		      stroke-linejoin="round"/>
		<!-- Connecting facet lines -->
		<line x1="0" y1="-100" x2="0" y2="-50" stroke="#000000" stroke-width="2"/>
		<line x1="70" y1="-70" x2="35" y2="-35" stroke="#5c5c5c" stroke-width="1.5"/>
		<line x1="100" y1="0" x2="50" y2="0" stroke="#000000" stroke-width="2"/>
		<line x1="70" y1="70" x2="35" y2="35" stroke="#5c5c5c" stroke-width="1.5"/>
		<line x1="0" y1="100" x2="0" y2="50" stroke="#000000" stroke-width="2"/>
		<line x1="-70" y1="70" x2="-35" y2="35" stroke="#5c5c5c" stroke-width="1.5"/>
		<line x1="-100" y1="0" x2="-50" y2="0" stroke="#000000" stroke-width="2"/>
		<line x1="-70" y1="-70" x2="-35" y2="-35" stroke="#5c5c5c" stroke-width="1.5"/>
	</g>

	<!-- Main content area -->
	<!-- Brand name with italicized accented e -->
	<text x="600" y="240"
	      font-family="Georgia, 'Times New Roman', serif"
	      font-size="96"
	      font-weight="500"
	      fill="#000000"
	      text-anchor="middle"
	      letter-spacing="0.08em">GemsLab<tspan font-style="italic">é</tspan></text>

	<!-- Pronunciation guide using IPA characters -->
	<text x="600" y="290"
	      font-family="Georgia, 'Times New Roman', serif"
	      font-size="24"
	      font-style="italic"
	      fill="#5c5c5c"
	      text-anchor="middle">/ˈdʒemzləˈbeɪ/</text>

	<!-- Tagline -->
	<text x="600" y="370"
	      font-family="Georgia, 'Times New Roman', serif"
	      font-size="32"
	      fill="#000000"
	      text-anchor="middle"
	      letter-spacing="0.02em">Gemological Expertise and Consultancy</text>

	<!-- Professional credentials -->
	<text x="600" y="430"
	      font-family="Georgia, 'Times New Roman', serif"
	      font-size="22"
	      fill="#5c5c5c"
	      text-anchor="middle">Olena Rybnikova, PhD in Mineralogy</text>

	<text x="600" y="465"
	      font-family="Georgia, 'Times New Roman', serif"
	      font-size="20"
	      fill="#5c5c5c"
	      text-anchor="middle">Applied Jewelry Professional (GIA)</text>

	<!-- Small gem icons as decorative elements -->
	<!-- Left gem -->
	<g transform="translate(420, 520) scale(0.3)">
		<path d="M0 -50 L35 -35 L50 0 L35 35 L0 50 L-35 35 L-50 0 L-35 -35 Z"
		      fill="none"
		      stroke="#d4cec4"
		      stroke-width="4"
		      stroke-linejoin="round"/>
		<circle cx="0" cy="0" r="6" fill="#d4cec4"/>
	</g>

	<!-- Center gem -->
	<g transform="translate(600, 520) scale(0.35)">
		<path d="M0 -50 L35 -35 L50 0 L35 35 L0 50 L-35 35 L-50 0 L-35 -35 Z"
		      fill="none"
		      stroke="#5c5c5c"
		      stroke-width="4"
		      stroke-linejoin="round"/>
		<path d="M0 -25 L18 -18 L25 0 L18 18 L0 25 L-18 18 L-25 0 L-18 -18 Z"
		      fill="none"
		      stroke="#5c5c5c"
		      stroke-width="3"
		      stroke-linejoin="round"/>
		<line x1="0" y1="-50" x2="0" y2="-25" stroke="#5c5c5c" stroke-width="3"/>
		<line x1="50" y1="0" x2="25" y2="0" stroke="#5c5c5c" stroke-width="3"/>
		<line x1="0" y1="50" x2="0" y2="25" stroke="#5c5c5c" stroke-width="3"/>
		<line x1="-50" y1="0" x2="-25" y2="0" stroke="#5c5c5c" stroke-width="3"/>
	</g>

	<!-- Right gem -->
	<g transform="translate(780, 520) scale(0.3)">
		<path d="M0 -50 L35 -35 L50 0 L35 35 L0 50 L-35 35 L-50 0 L-35 -35 Z"
		      fill="none"
		      stroke="#d4cec4"
		      stroke-width="4"
		      stroke-linejoin="round"/>
		<circle cx="0" cy="0" r="6" fill="#d4cec4"/>
	</g>

	<!-- Website URL -->
	<text x="600" y="595"
	      font-family="Georgia, 'Times New Roman', serif"
	      font-size="18"
	      fill="#5c5c5c"
	      text-anchor="middle"
	      letter-spacing="0.1em">gemsla.be</text>
</svg>
