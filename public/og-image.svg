<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
	<defs>
		<!-- Subtle gradient for depth -->
		<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color:#ffffff"/>
			<stop offset="100%" style="stop-color:#f5f0e8"/>
		</linearGradient>

		<!-- Noise texture pattern -->
		<filter id="noise" x="0%" y="0%" width="100%" height="100%">
			<feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
			<feColorMatrix type="saturate" values="0" result="mono"/>
			<feBlend in="SourceGraphic" in2="mono" mode="multiply"/>
		</filter>
	</defs>

	<!-- Background -->
	<rect width="1200" height="630" fill="url(#bgGradient)"/>

	<!-- Subtle noise overlay -->
	<rect width="1200" height="630" fill="#f5f0e8" opacity="0.05" filter="url(#noise)"/>

	<!-- Logo + Title row, centered horizontally -->
	<g transform="translate(600, 260)">
		<!-- Logo at left side of group -->
		<g transform="translate(-320, 0)">
			<!-- Black circular background -->
			<circle cx="0" cy="0" r="70" fill="#000000"/>

			<!-- Side-view diamond - classic brilliant cut profile (scaled from favicon) -->
			<!-- Diamond center in favicon: x=(122+390)/2=256, y=(140+380)/2=260 -->
			<!-- Scale 140/512 = 0.273 to fit in r=70 circle -->
			<!-- Translate by (-256*0.273, -260*0.273) = (-70, -71) to center at origin -->
			<g transform="translate(-70, -71) scale(0.273)">
				<path d="M180 140 L332 140 L390 190 L122 190 Z" fill="#ffffff"/>
				<path d="M122 190 L390 190 L256 380 Z" fill="#ffffff"/>
			</g>
		</g>

		<!-- Brand name with italicized accented e, to the right of logo -->
		<text x="-220" y="10"
		      font-family="Georgia, 'Times New Roman', serif"
		      font-size="115"
		      font-weight="500"
		      fill="#000000"
		      text-anchor="start"
		      dominant-baseline="middle"
		      letter-spacing="0.08em">GemsLab<tspan font-style="italic">é</tspan></text>
	</g>

	<!-- Tagline centered below -->
	<text x="680" y="360"
	      font-family="Georgia, 'Times New Roman', serif"
	      font-size="32"
	      fill="#5c5c5c"
	      text-anchor="middle"
	      letter-spacing="0.02em">Gemological Expertise and Consultancy</text>
</svg>
